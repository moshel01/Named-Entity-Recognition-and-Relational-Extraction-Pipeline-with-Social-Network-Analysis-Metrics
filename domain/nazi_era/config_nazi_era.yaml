# Pre-built pipeline config for the Nazi-era domain (Theodore Abel Papers,
# SS biograms, and similar Weimar/Nazi-era primary sources).
#
#   python main.py --config domain/nazi_era/config_nazi_era.yaml
#
# Set `mode: api` (and an API key env var) or `mode: ollama` for LLM-based
# relationship extraction; `python_only` runs fully offline.

run_name: "abel_papers"
mode: "python_only"

io:
  input_path: "./data/abel_papers"   # directory of autobiography text files
  input_glob: "**/*"
  output_dir: "./output"
  encoding: "auto"
  metadata_file: "./data/abel_papers/Nazi metadata.xlsx"   # merged onto author nodes by letter_id

chunking:
  max_chars: 5000
  overlap_chars: 500
  respect_sentences: true

foundation:
  # German text: the German transformer/large model is preferred if installed;
  # falls back automatically to en_core_web_sm / blank if unavailable.
  spacy_model: "de_core_news_lg"
  spacy_disable: []
  # MULTILINGUAL GLiNER2 - required for German. English-only models badly
  # under-recall German. GLiNER2-multi (mDeBERTa, 100+ langs) is the default.
  gliner_model: "fastino/gliner2-multi-v1"
  gliner_threshold: 0.40
  # NOTE: gliner_labels / label_map below are OVERRIDDEN by the nazi_era domain
  # (24 labels in domain/nazi_era/gliner_labels.py). Kept here as documentation.
  gliner_labels: ["person", "organization", "location", "event"]
  label_map:
    person: "PERSON"
    organization: "ORG"
    location: "LOCATION"
    event: "EVENT"
  use_spacy_ner: true
  device: "auto"

coreference:
  enabled: true
  # First-person narration -> a per-document "Narrator [file]" author node.
  # Critical for the first-person Abel autobiographies and the basis for the
  # "authors_only" mandatory-membership scope below.
  narrator_resolution: true
  # fastcoref third-person pronoun resolution (English-oriented; optional).
  pronoun_resolution: false
  model: "biu-nlp/f-coref"
  device: "auto"
  max_narrator_mentions_per_chunk: 40
  languages: ["de", "en"]

intelligence:
  api:
    provider: "anthropic"
    model: "claude-opus-4-8"
    api_key_env: "ANTHROPIC_API_KEY"
    max_tokens: 4096
    temperature: 0.0
    max_retries: 4
    request_timeout: 120
    aws_region: "us-east-1"
  ollama:
    host: "http://localhost:11434"
    # qwen3.5:9b: current best fit for 8 GB, beats qwen3:8b on relations.
    # Override per machine, e.g. --ollama-model gemma4:26b / qwen3.6:27b.
    model: "qwen3.5:9b"
    temperature: 0.0
    request_timeout: 600     # large models (26B/27B) are slower; avoid timeouts
    num_ctx: 8192
  python_only:
    embedding_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
    cooccurrence_window: "sentence"
    min_relationship_confidence: 0.30
    embedding_similarity_threshold: 0.55

dedup:
  fuzzy_thresholds:
    PERSON: 0.85
    ORG: 0.72
    LOCATION: 0.82
    EVENT: 0.92
    RANK: 0.88
    INSTITUTION: 0.80
    DATE: 0.95
  block_family_merges: true
  block_year_mismatch_events: true
  block_location_substring: true
  llm_assist: true        # LLM proposes extra merges (ollama/api only)

enrichment:
  enabled: true           # LLM subtype/rank/office for resolved entities
  batch_size: 40

quality:
  enabled: true
  min_entity_mentions: 1
  min_edge_weight: 1
  llm_review: "auto"

inference:
  enable_cooccurrence_edges: true
  cooccurrence_min_shared_docs: 2
  # Disparity-filter backbone (Serrano 2009) over the co-occurrence layer. 0 = off
  # (just stamp disparity_alpha for manual filtering). The Abel letters aren't
  # entity-dense like a web crawl, so the default is off; raise to ~0.1 to keep
  # only statistically significant co-mentions.
  cooccurrence_backbone_alpha: 0.0
  # Turn on evidence-based membership + structural edges for this corpus.
  enable_canonical_inference: true
  # Mandatory NSDAP membership assumption (documents are NSDAP autobiographies):
  #   authors_only - only the detected narrator/author of each document (DEFAULT,
  #                  defensible; requires coreference.narrator_resolution: true)
  #   all          - every PERSON (legacy; over-connects, tags mentioned third
  #                  parties like Marx/Lenin as members - not recommended)
  #   off          - no mandatory edges; NSDAP only via textual evidence
  mandatory_membership: "authors_only"

ontology:
  enabled: true                    # uses nazi_era RELATION_ONTOLOGY (member_of, fought_in, ...)
  fuzzy_threshold: 0.82
  drop_unmapped: false
  relations: null                  # null => use the domain ontology

# Wikidata linking - off by default. Flip enabled:true to add wikidata_qid to the
# well-known figures/places (Hitler->Q352, Berlin->Q64). German lang for matching.
linking:
  enabled: false
  min_mentions: 3
  max_entities: 500
  types: ["PERSON", "ORG", "LOCATION"]
  lang: "de"
  request_timeout: 8

domain:
  name: "nazi_era"

export:
  formats: ["csv", "json", "gexf", "jsonl"]
  gephi: true
  graph_metrics: true      # brokerage/bridges/articulation + signed balance + graph_report.json
  # These are first-person life narratives - Bearman & Stovel's (2000) exact case.
  # Build the corpus-level narrative-sequence network (war -> hardship -> politics).
  narrative_network: true
  codebook_note: >-
    Theodore Abel Papers: autobiographical essays submitted to Abel's 1934
    contest for early NSDAP members. Opt-in sample of committed members, not
    a random draw of the membership - read network statistics as descriptive
    of this corpus, not inferential for the movement. Mentions reflect what
    authors chose to recount in 1934, writing under the regime they joined.

checkpoint:
  enabled: true
  flush_every: 1
