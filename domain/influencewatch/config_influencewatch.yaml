# Pipeline config for the InfluenceWatch domain: modern US political-influence
# networks (dark money, PAC/shell funding, boards, lobbying).
#
#   python main.py --config domain/influencewatch/config_influencewatch.yaml --mode ollama
#
# Source is scraped profiles + news, not first-person, so narrator resolution is
# off. The money-flow and board-affiliation layers are the point: affiliation
# projection is ON, and monetary_value rides as an edge qualifier.

run_name: "influencewatch"
mode: "python_only"        # set ollama/api for relation extraction

io:
  input_path: "./data/influencewatch"   # dir of text/markdown, or use urls/crawl
  input_glob: "**/*"
  output_dir: "./output"
  encoding: "auto"
  # LittleSis: import the curated influence graph DIRECTLY as asserted edges (donations
  # with amounts, boards, ownership). The highest-quality layer for this domain - human-
  # sourced, not LLM-extracted. CC BY-SA: attribute it in any published network.
  # littlesis: ["search:Koch Industries", "search:Arabella Advisors", "id:28220"]
  # littlesis_limit: 10                  # seed entities per search spec
  # Whole-site crawl of the influencewatch.org profile DB. Server-rendered WordPress
  # (no JS render needed). robots.txt allows everything but /wp-json/; sitemap_index.xml
  # seeds the profile URLs. allow/deny keep the page budget on profiles, not chrome.
  crawl:
    # OFF: the scrape is frozen to documents.jsonl - feed it back with --ingest-from.
    # A run without --ingest-from must NOT silently re-crawl (and clobber) the snapshot.
    # Set true only for a deliberate --stage fetch that (re)builds the snapshot.
    enabled: false
    seeds: ["https://www.influencewatch.org/"]
    max_pages: 16000             # covers the full site (15,477 profiles, counted from
                                 # the sitemaps: 2,427 person + 13,050 group); headroom
                                 # for the seed. Ctrl-C anytime, --resume continues.
    max_depth: 4
    stay_on_host: true
    respect_robots: true
    use_sitemap: true
    delay: 0.0                   # no pause; robots.txt verified to set no Crawl-delay.
                                 # crawler is sequential, so rate is latency-bound (~2-5 req/s).
                                 # back off if the log shows 429/503 - rate-limited pages come
                                 # back empty and would pollute the scrape.
    checkpoint_every: 25         # flush frontier+pages every 25 kept; --resume to finish
    boilerplate:                 # nav fragment trafilatura leaves on stub profiles
      - "Or browse groups, people, or influence networks\\.\\s*"
    allow:
      - "influencewatch\\.org/(non-profit|for-profit|person|organization|political-party|government-agency|labor-union|foundation|political-action-committee|trade-association|movement)/[^/]+/?$"
    deny:
      - "/wp-json/"
      - "/\\?"                  # query-string chrome (search, pagination, rest_route)
      - "/(tag|category|author|feed|page)/"

chunking:
  # 8000 (up from 6000): a 27B at num_ctx 16384 swallows it, and it cuts the per-chunk LLM
  # call count ~13% while pushing ~86% of docs to a single chunk - so the multichunk-gated
  # recall pass fires on far fewer. Bump to 10000 if recall holds on the dense hub profiles.
  max_chars: 8000
  overlap_chars: 400
  respect_sentences: true

foundation:
  spacy_model: "en_core_web_trf"   # falls back to sm/blank if not installed
  gliner_model: "fastino/gliner2-multi-v1"
  gliner_threshold: 0.45
  # gliner_labels/label_map below are OVERRIDDEN by the domain (21 labels in
  # domain/influencewatch/gliner_labels.py). Kept for documentation.
  gliner_labels: ["person", "organization", "location"]
  label_map:
    person: "PERSON"
    organization: "ORG"
    location: "LOCATION"
  use_spacy_ner: true
  device: "auto"

coreference:
  enabled: true
  narrator_resolution: false       # not first-person
  pronoun_resolution: false        # flip on (needs fastcoref) for he/she/they in articles
  languages: ["en"]

intelligence:
  ollama:
    host: "http://100.69.145.24:11434"   # friend's 5090 over tailscale; localhost for the 3070
    # qwen3.6:27b: ~1.5-2x faster than gemma4:31b on this box and competitive on relations.
    # think:false is forced in the ollama backend, so no <think> traces pollute the JSON.
    # gemma4:31b is the slower-but-strong alt (--ollama-model gemma4:31b to swap back).
    model: "qwen3.6:27b"
    temperature: 0.0
    request_timeout: 600
    num_ctx: 16384
  python_only:
    embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
    cooccurrence_window: "sentence"
    min_relationship_confidence: 0.30
  # Capture funding amounts and the date a flow/role is stated. Generic qual_*
  # columns - no per-field code. monetary_value is the InfluenceWatch lever.
  edge_qualifiers: ["monetary_value", "date"]
  # Surface relation argument types in the prompt to cut type-violating edges.
  # A/B against quality_pillars.consistency.type_violations_by_relation.
  type_hints: true
  # Grammar-constrain the JSON so the local model can't leak prose (ollama format=schema).
  structured_output: true
  # Re-prompt the whole doc for cross-chunk ties the chunked pass missed...
  recall_pass: true
  # ...but only on multi-chunk docs. 86% of these profiles are a single chunk, where the
  # recall pass has no cross-chunk tie to find and just re-reads the same text at full cost.
  recall_multichunk_only: true
  # Skip the LLM relation call on chunks too sparse to hold a tie (entities still kept).
  # Saves calls on thin stubs / boilerplate; dense profile prose mostly still runs.
  skip_sparse_chunks: true

dedup:
  fuzzy_thresholds:
    PERSON: 0.85
    ORG: 0.78           # org names vary (Inc/LLC/Foundation suffixes); a bit looser
    LOCATION: 0.85
    INSTITUTION: 0.80
  llm_assist: true

enrichment:
  enabled: true
  batch_size: 40

quality:
  enabled: true
  min_entity_mentions: 1
  min_edge_weight: 1
  llm_review: "auto"
  # Re-check each LLM edge against its evidence. OFF for the full run: it's tag-only here
  # (trust_verification off) and a local verifier over-rejects, so it is one batched call per
  # 20 edges of pure cost for advisory flags. Flip on for a final QA-only --stage analyze pass.
  verify_relations: false
  trust_verification: false

inference:
  enable_cooccurrence_edges: true
  cooccurrence_min_shared_docs: 2
  # GLiNER over-extracts on dense profile prose; the disparity filter (Serrano 2009)
  # thins the co-occurrence layer so it stops drowning the asserted ties.
  cooccurrence_backbone_alpha: 0.1
  enable_canonical_inference: true
  mandatory_membership: "off"      # not a membership corpus
  # The headline for this domain: actors on the same board/PAC get a co_affiliated
  # edge (Breiger two-mode -> one-mode). min_shared 1 = any shared org links them.
  enable_affiliation_projection: true
  affiliation_min_shared: 1

ontology:
  enabled: true
  fuzzy_threshold: 0.82
  drop_unmapped: false
  relations: null                  # null => use the domain ontology

linking:
  enabled: false                   # flip on to add wikidata_qid to well-known orgs
  min_mentions: 3
  types: ["PERSON", "ORG"]
  lang: "en"

domain:
  name: "influencewatch"

export:
  formats: ["csv", "json", "gexf", "jsonl"]
  gephi: true
  graph_metrics: true
  narrative_network: false
  codebook_note: >-
    InfluenceWatch-style influence network. Edges are claims extracted from
    profiles/news, not verified filings - treat funding/board ties as asserted,
    not adjudicated. monetary_value (qual_*) is whatever the text stated, not a
    reconciled total. co_affiliated edges are co-membership projections, not
    direct ties.

checkpoint:
  enabled: true
  flush_every: 1
