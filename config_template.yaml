# NER + SNA Extraction Pipeline - Configuration Template
# Copy to config.yaml and edit. Every field documented inline.
# Run:  python main.py --config config.yaml

# Run identity
run_name: "default_run"          # Used for output subdir + checkpoint namespace

# Execution mode
# api          -> Mode 1: GLiNER + spaCy + cloud LLM (Claude/OpenAI/Bedrock)
# python_only  -> Mode 2: GLiNER + spaCy + rules/embeddings (no network)
# ollama       -> Mode 3: GLiNER + spaCy + local LLM via Ollama
# gemini_batch -> Mode 4: write one whole-corpus prompt, paste into a 2M-context
#                 model, save the JSON reply; --stage extract then --stage analyze
mode: "python_only"

# Input / output
# Inputs may be ANY combination of: a file, a directory (recursive glob), an
# http(s) URL, a list of URLs, and/or raw text passed on the CLI (--text).
# Supported file types: .txt .md .pdf .docx .rtf .html/.htm
io:
  input_path: "./data/input"     # File, directory, OR an http(s) URL
  input_glob: "**/*"             # Glob applied when input_path is a directory
  output_dir: "./output"         # All artifacts written under output_dir/run_name
  encoding: "auto"               # "auto" (chardet) or explicit e.g. "utf-8"
  urls: []                       # Web pages / PDFs to fetch, e.g. ["https://..."]
  urls_file: ""                  # Path to a newline-delimited list of URLs
  request_timeout: 30            # Per-URL fetch timeout (seconds)
  # Whole-site crawl: expand seed URLs into their subpages, fetch-once, merge into
  # one network. Off by default. Bounded + polite by construction (robots.txt,
  # per-host rate limit, page/depth/size caps). The discovered URL list is cached
  # in the run dir so re-analysis (--stage analyze) does not re-crawl.
  # CLI shortcut: --crawl <seed> [--crawl-max-pages N] [--crawl-max-depth N].
  crawl:
    enabled: false               # Master switch (or pass --crawl on the CLI)
    seeds: []                     # Start URLs, e.g. ["https://example.org/topic/"]
    max_pages: 50                # Hard cap on documents fetched
    max_depth: 3                 # Link hops from a seed
    stay_on_host: true           # Don't leave the seed's host (www. folded)
    stay_under_path: false       # Also require the seed's directory prefix
    allow: []                    # Regex allowlist; if set, a URL must match one
    deny: []                     # Regex denylist; URL dropped if it matches any
    delay: 1.0                   # Min seconds between requests to one host (be polite)
    respect_robots: true         # Obey robots.txt + Crawl-delay. Leave on.
    use_sitemap: true            # Seed the frontier from sitemap.xml when present
    user_agent: ""               # Blank -> pipeline default UA
    timeout: 30                  # Per-page fetch timeout (seconds)
    max_bytes: 5000000           # Skip a page once its download exceeds this
  # Structure-aware ingestion via Docling (layout + tables -> markdown, OCR for
  # scanned PDFs). Best for research papers / complex PDFs / images. Heavy
  # (downloads torch models on first use) and opt-in; falls back to the
  # lightweight extractors if Docling isn't installed or a file fails.
  # Requires: pip install docling
  use_docling: false

# Chunking
chunking:
  max_chars: 6000                # Soft cap per chunk
  overlap_chars: 400             # Sentence-aligned overlap between chunks
  respect_sentences: true        # Never split mid-sentence when possible

# Foundation layer
foundation:
  spacy_model: "en_core_web_trf"   # Falls back to en_core_web_sm if unavailable
  spacy_disable: []                # e.g. ["lemmatizer"] to speed up
  # NER backend is GLiNER2 (fastino/* models). The original GLiNER (urchade/*)
  # is deprecated and no longer loads.
  #   Multilingual / mixed:  fastino/gliner2-multi-v1   <-- default (100+ langs, mDeBERTa)
  #   English-only, heavier: fastino/gliner2-large-v1   (best English NER; ~2x the load)
  gliner_model: "fastino/gliner2-multi-v1"
  gliner_threshold: 0.45           # Min GLiNER confidence to keep a span
  gliner_labels:                   # Zero-shot labels - edit per corpus
    - "person"
    - "organization"
    - "location"
    - "event"
  # Map GLiNER labels (lowercase) to canonical entity types used downstream
  label_map:
    person: "PERSON"
    organization: "ORG"
    location: "LOCATION"
    event: "EVENT"
  use_spacy_ner: true              # Merge spaCy's statistical NER with GLiNER
  restrict_to_label_types: true    # Drop entities whose type isn't in label_map
  # spaCy NER labels to ignore. NORP (nationalities/adjectives: "American",
  # "German") maps to ORG and is the #1 ORG false-positive source - keep excluded
  # unless you specifically want nationality nodes. (German spaCy has no NORP, so
  # this is a no-op there.)
  exclude_spacy_labels: ["NORP"]
  device: "auto"                   # "auto" | "cpu" | "cuda" | "mps"

# Coreference
coreference:
  enabled: true
  narrator_resolution: true        # First-person narration -> per-doc author node
  pronoun_resolution: false        # fastcoref third-person resolution (optional)
  model: "biu-nlp/f-coref"
  device: "auto"
  # "" = load fastcoref in-process. Or offload it to the coref microservice
  # (services/coref_service.py) - lighter main env, isolates transformers <5.
  # e.g. "http://127.0.0.1:8000". Unreachable falls back to in-process/heuristic.
  service_url: ""
  max_narrator_mentions_per_chunk: 40
  languages: ["en"]                # add "de" for German first-person pronouns

# Intelligence tier
intelligence:
  # Mode 1: api
  api:
    provider: "anthropic"          # "anthropic" | "openai" | "bedrock"
    model: "claude-opus-4-8"       # anthropic/openai model id, or bedrock model id
    api_key_env: "ANTHROPIC_API_KEY"   # Env var holding the key (not the key!)
    # Cheap path: any OpenAI-compatible endpoint via provider: openai + base_url.
    # DeepSeek (recommended cheap target):
    #   provider: "openai"
    #   model: "deepseek-chat"           # V3 - cheap, fast, JSON-mode capable
    #   api_key_env: "DEEPSEEK_API_KEY"
    #   base_url: "https://api.deepseek.com"
    #   json_mode: true
    # Use deepseek-chat, NOT deepseek-reasoner (R1): R1 burns tokens on reasoning
    # and its structured output is unreliable (same trap as qwen3.5). Also works
    # for Together/Groq/OpenRouter/local vLLM - just change base_url + model.
    base_url: ""                   # OpenAI-compatible host; empty = provider default
    json_mode: false               # response_format json_object (OpenAI/DeepSeek-chat)
    max_tokens: 4096
    temperature: 0.0
    max_retries: 4
    request_timeout: 120
    # Bedrock only:
    aws_region: "us-east-1"
  # Cost gate (api/ollama): skip the relation call for chunks too sparse to hold a
  # relation. Free NER (GLiNER) still runs; only entity-dense chunks reach the API.
  skip_sparse_chunks: false        # true to save tokens on a paid endpoint
  sparse_window_words: 200         # a relation needs 2 entities within this window
  sparse_min_entities: 2
  # Optional per-edge qualifier fields the LLM fills when the text states them - a
  # typed attribute on a relation, not a new relation. They ride through to the
  # Gephi/GEXF export as `qual_<name>` edge columns. Empty = none (default).
  # Examples: monetary_value (funding amounts), jurisdiction (disaster scope),
  # location/time (spatiotemporal record), weapon/setting (a script).
  edge_qualifiers: []              # e.g. ["monetary_value", "jurisdiction"]
  # Show each constrained relation's argument types in the prompt
  # (born_in: person->place, employed_by: person->org) so the model forms fewer
  # type-violating edges at the source. Only relations with a signature get a hint;
  # loose stance/interaction types are unconstrained. A/B vs type_violations_by_relation.
  type_hints: false
  # Schema-constrained generation: pass a JSON schema to the backend (ollama
  # format=<schema>, OpenAI/Gemini json_schema) so a weak local model can't leak
  # prose into the JSON and lose the whole document. Enforces shape + the entity-type
  # enum, not the relation vocabulary. Recommended for ollama; anthropic constrains
  # via the API's output_config json_schema; bedrock ignores it; gemini_batch
  # already forces JSON.
  structured_output: false
  # Documents extracted concurrently (ollama/api modes; 1 = the sequential loop,
  # unchanged). Ollama also needs OLLAMA_NUM_PARALLEL on the SERVER plus VRAM for
  # parallel*num_ctx KV - without that, requests queue and the gain is only the
  # hidden network/parse latency.
  parallel_docs: 1
  # Recall pass: after chunk-by-chunk extraction, re-prompt over the whole document
  # for relations the first pass missed (mainly ties whose endpoints fell in different
  # chunks). The recall half of generate-then-verify; pair with quality.verify_relations.
  # LLM modes only (one extra call/doc), off by default. gemini_batch already sees whole
  # docs so it mainly lifts api/ollama. A doc longer than recall_max_chars is skipped.
  recall_pass: false
  recall_max_chars: 24000
  # Mode 4 (gemini_batch): docs per emitted prompt file - the anti-truncation knob,
  # since the model's reply length scales with doc count (0 = char-budget only).
  batch_max_docs: 0              # e.g. 25 for dense first-person sources
  # gemini_batch --submit: auto-call the Gemini API instead of pasting. Free key
  # from aistudio.google.com/apikey in this env var.
  batch_api_key_env: "GEMINI_API_KEY"
  batch_model: "gemini-2.5-flash"   # or gemini-2.5-pro (higher quality, lower free RPD)
  # 2.5-flash thinks by default and those tokens count against the output cap, so
  # they eat the JSON budget and truncate the reply. 0 = thinking off (right for
  # extraction; frees the whole output budget). <0 keeps the default reasoning on.
  # 2.5-pro can't go below 128, so 0 is bumped to 128 there.
  batch_thinking_budget: 0
  # gemini_batch extracts from the whole-doc reply, so the post-extraction LLM steps
  # (dedup.llm_assist / quality.llm_review / enrichment) normally have no backend and
  # are skipped (you get a warning). Flip this on to run them through Gemini's OpenAI
  # endpoint with the same key - extra API calls at analyze time, so off by default.
  batch_post_llm: false
  # Cap --submit request starts per minute to match the free-tier RPM (10 for
  # gemini-2.5-flash) so the loop spaces requests instead of tripping 429 + backoff.
  # 0 = unthrottled. No-op when whole-doc replies are already slower than the interval.
  batch_rpm: 0
  # gemini_batch: after the whole-doc reply, re-run local GLiNER/spaCy and fold spans
  # onto the span-less LLM entities - turns on the within-doc proximity co-occurrence
  # floor + evidence grounding the model's name-only output can't give. Post-hoc, not
  # priming. Loads the foundation models at analyze time. Off by default; A/B it.
  reconcile_ner: false
  # The recall net: also ADD GLiNER entities the LLM missed (tagged ner_only). FALSE
  # by default - on the Abel pilot it flooded 297 real entities with ~1850 GLiNER
  # over-extractions (asserted tier 85% -> 2%). Turn on only for a sparse corpus where
  # the LLM under-extracts; span transfer (the useful half) works without it.
  reconcile_add_missed: false
  # Mode 3: ollama
  ollama:
    host: "http://localhost:11434"
    model: "llama3.1:8b"
    temperature: 0.0
    request_timeout: 180
    num_ctx: 8192
    # Output-token cap per call (0 = server default, unbounded). Bounds the damage
    # from a repetition loop - else a stuck model burns request_timeout per chunk.
    num_predict: 0
  # Mode 2: python_only
  python_only:
    embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
    cooccurrence_window: "sentence"   # "sentence" | "chunk"
    min_relationship_confidence: 0.30
    embedding_similarity_threshold: 0.55

# Deduplication
dedup:
  fuzzy_thresholds:
    PERSON: 0.85
    ORG: 0.72
    LOCATION: 0.82
    EVENT: 0.92
  block_family_merges: true        # Don't merge entities that look like kin
  block_year_mismatch_events: true # Don't merge events with different years
  block_location_substring: true   # Don't merge "Paris" into "Paris, Texas"

# Quality review
quality:
  enabled: true
  min_entity_mentions: 1           # Drop entities seen fewer times than this
  min_edge_weight: 1               # Drop edges with weight below this
  llm_review: "auto"               # "auto" (LLM in api/ollama modes), true, false
  # LLM relation self-verification: re-check each LLM edge against its evidence
  # ("does this sentence assert that tie?") and tag verification=supported/unsupported
  # (filterable in Gephi). Catches what verbatim grounding can't - evidence present
  # but not actually asserting the relation. LLM modes only (api/ollama, or
  # gemini_batch with batch_post_llm); extra API calls, so off by default.
  verify_relations: false
  verify_drop: false               # true = delete unsupported edges instead of tagging
  verify_max: 0                    # cap edges verified (0 = all eligible); cost knob
  # Whether unsupported flags are reliable enough to PRUNE the SNA metric graph
  # (brokerage/bridges/signed balance), not just tag the export. A weak local
  # self-verifier over-rejects (~50% on the Abel pilot), so leave this false for
  # ollama or half the real ties vanish from the structure before it is measured.
  # Turn it on only behind a strong verifier (api/gemini). Export is unchanged.
  trust_verification: false

# Inference / canonical edges
inference:
  enable_cooccurrence_edges: true
  cooccurrence_min_shared_docs: 2
  # Within-document window co-occurrence: link entities mentioned within N chars
  # of each other (doc-absolute, so it crosses chunk boundaries the LLM didn't).
  # Standard character-network signal; the only within-letter weak tie in
  # ollama/api mode. Co-occurrence stays full-tier only. 0 disables.
  enable_proximity_edges: true
  proximity_window_chars: 600
  # Floor on the within-doc layer: drop pairs co-occurring fewer than N times.
  # 1 = keep every adjacency (default). On dense/web corpora a single accidental
  # adjacency dominates the edge set (a Wikipedia crawl was ~60% weight-1) and can
  # bloat the GEXF past what Gephi will load - set 2-3 there. Typed edges untouched.
  proximity_min_count: 1
  # Disparity-filter backbone (Serrano et al. 2009) over the co-occurrence layer.
  # Every co_occurs_with edge is stamped with disparity_alpha; with alpha > 0,
  # edges not statistically significant for either endpoint are dropped, leaving
  # the weighted backbone. 0 = off (tag only). 0.05-0.30 on dense/web corpora
  # (a Wikipedia crawl went 20k -> 4k edges at 0.10). Typed edges untouched.
  cooccurrence_backbone_alpha: 0.0
  # Two-mode (affiliation) projection: actors sharing a formal group (org/event)
  # get a `co_affiliated` edge - the classic Breiger two-mode -> one-mode actor
  # network, Newman 1/(k-1) weighted. For affiliation-dense domains where direct
  # person-person ties are rare (political boards/PACs, multi-agency disaster
  # response). Full tier (a co-presence, not a direct asserted tie). On a domain
  # with a universal group (e.g. every NSDAP author shares NSDAP) raise
  # affiliation_min_shared to 2 so the near-clique drops out.
  enable_affiliation_projection: false
  affiliation_min_shared: 1
  # Which entity kinds are the actors vs the shared groups. Default: people share
  # orgs/events. Multi-agency disaster response makes the AGENCIES the actors over
  # a shared response EVENT (actor_kinds: ["ORG","INSTITUTION"], group_kinds:
  # ["EVENT"]) - two agencies on the same fire link directly.
  affiliation_actor_kinds: ["PERSON"]
  affiliation_group_kinds: ["ORG", "INSTITUTION", "EVENT"]
  enable_canonical_inference: false   # Domain rules add membership edges
  # Domain mandatory-membership assumption: authors_only | all | off
  mandatory_membership: "authors_only"

# Relation ontology
# Normalize extracted relation types onto a canonical vocabulary and (in LLM
# modes) constrain extraction to it. If `relations` is null the ontology comes
# from the active domain; generic domain has none, so this is a no-op by default.
ontology:
  enabled: true                    # false = free-form relations (no schema at all)
  fuzzy_threshold: 0.82
  drop_unmapped: false             # true = drop edges that match no canonical type
  # Type-signature consistency check (ASP-style): a relation whose endpoint
  # entity types contradict its signature ("led"/"born_in" pointing at a place
  # or an org) is tagged type_violation (filterable in Gephi). Only constraining
  # relations have a signature; loose stance/interaction relations are exempt.
  drop_type_violations: false      # true = drop the violations instead of tagging
  # Functional-property consistency (global, vs the per-edge type gate above): a
  # subject with the same functional relation (born_in, birth_date, died_in...)
  # pointing at two different targets is a contradiction. Tag every edge in the
  # conflict `functional_conflict` (filterable; a column appears only on real
  # conflicts). On by default (tag only). drop_functional_conflicts keeps just the
  # best-supported target (most edges, then confidence) - knowledge fusion.
  check_functional_consistency: true
  drop_functional_conflicts: false
  # null + no domain -> a built-in generic schema (funded/led/member_of...) so a
  # web crawl gets a usable edge vocabulary instead of a unique verb phrase per
  # edge. Set your own to override; ontology.enabled:false to turn it off.
  relations: null                  # dict{canonical:[synonyms]} | list[str] | null

# Network expansion: grow an EXISTING network from new documents instead of
# building a fresh one. Reads the schema of a prior run and locks this run to it -
# the relation vocabulary ("strict edge formatting") and the entity kinds - so the
# new material stays consistent with what you already curated. Off by default.
# Works in `--stage analyze` too (re-lock an existing checkpoint).
expansion:
  enabled: false
  source: ""                       # prior run dir, its gephi_edges.csv, or a network.gexf
  lock_relations: true             # only keep relation types already in the source
  drop_unmapped_relations: true    # strict: drop a new edge whose type isn't in that set
  lock_entity_types: true          # keep only the entity kinds already in the source
  entity_types: []                 # explicit override, e.g. ["PERSON","ORG"] (wins over lock_entity_types)

# Optional Wikidata entity linking (adds attr_wikidata_qid/url/label). Off by
# default - it makes network calls. Bounded and fail-soft (never breaks a run).
linking:
  enabled: false
  min_mentions: 2                  # only link entities seen at least this often
  max_entities: 400                # hard cap on lookups per run
  types: ["PERSON", "ORG", "LOCATION"]
  lang: "en"                       # Wikidata search language
  request_timeout: 8
  # A shared QID is a high-precision cross-doc identity key: fold same-QID nodes
  # string dedup kept apart ("Goebbels" + "Joseph Goebbels"). Only acts when linking is on.
  consolidate_by_qid: true

# Domain plugin
domain:
  name: "generic"                  # Folder under domain/ to load

# Export
export:
  formats: ["csv", "json", "gexf"] # subset of csv|parquet|json|gexf|jsonl
  gephi: true
  # Precompute SNA metrics Gephi can't: Burt's constraint/effective_size
  # (structural-hole brokerage), bridges, articulation points, + a graph-health
  # QA report (graph_report.json). Standard centrality/community: let Gephi do it.
  graph_metrics: true
  # Narrative-sequence network (Bearman & Stovel 2000): corpus-level element->
  # element transitions from the timeline (war -> hardship -> politics). Writes
  # narrative.gexf + narrative_transitions.csv. Best on first-person life stories.
  # narrative_network: false
  # codebook: true                 # codebook.xlsx (variable definitions; on by default)
  # codebook_note: ""              # corpus caveat shown in the codebook overview
                                   # (sampling frame, known biases)

# ... and under `ontology:` you can pin the meaning of confusable labels:
# ontology:
#   relations: [associate, friend, enemy]   # constrain the LLM to these
#   relation_guide:                          # one-line defs shown next to them
#     associate: "Default companionship tie. NOT friend unless affection stated."
#     friend: "Use only when the text states friendship/affection."

# Checkpointing
checkpoint:
  enabled: true
  flush_every: 1                   # Flush checkpoint after every N documents
